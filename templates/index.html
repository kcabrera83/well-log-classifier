<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well Log Classifier</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 30px;
        }
        header h1 { font-size: 2rem; color: #06b6d4; }
        header p { color: #94a3b8; margin-top: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        .card h2 { color: #06b6d4; margin-bottom: 16px; font-size: 1.1rem; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 0.85rem; }
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }
        input[type="number"]:focus { outline: none; border-color: #06b6d4; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #06b6d4;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #22d3ee; }
        .result-box {
            margin-top: 16px;
            padding: 16px;
            background-color: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            min-height: 60px;
        }
        .result-box .label { color: #06b6d4; font-weight: 600; margin-bottom: 6px; }
        .result-box .value { font-size: 1.4rem; color: #f1f5f9; }
        .prob-bar-container { margin-top: 6px; }
        .prob-row { display: flex; align-items: center; margin-bottom: 4px; }
        .prob-row .name { width: 100px; font-size: 0.8rem; color: #94a3b8; }
        .prob-row .bar-bg {
            flex: 1;
            height: 14px;
            background-color: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 8px;
        }
        .prob-row .bar-fill {
            height: 100%;
            background-color: #06b6d4;
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .prob-row .pct { width: 50px; text-align: right; font-size: 0.8rem; margin-left: 8px; }
        .health-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .health-ok { background-color: #064e3b; color: #34d399; }
        .health-err { background-color: #7f1d1d; color: #fca5a5; }
        footer {
            text-align: center;
            padding: 24px 0;
            color: #475569;
            font-size: 0.8rem;
            border-top: 1px solid #1e293b;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Well Log Classifier</h1>
            <p>ML-based lithology classification and porosity estimation</p>
            <p style="margin-top:4px">
                Status: <span id="health-badge" class="health-badge health-err">Checking...</span>
            </p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Lithology Classification</h2>
                <label for="gr">Gamma Ray (API)</label>
                <input type="number" id="gr" value="40" step="1">
                <label for="res">Resistivity (ohm.m)</label>
                <input type="number" id="res" value="50" step="1">
                <label for="np">Neutron Porosity (%)</label>
                <input type="number" id="np" value="25" step="0.1">
                <label for="dp">Density Porosity (%)</label>
                <input type="number" id="dp" value="22" step="0.1">
                <label for="sonic">Sonic (us/ft)</label>
                <input type="number" id="sonic" value="75" step="1">
                <label for="cal">Caliper (in)</label>
                <input type="number" id="cal" value="8.5" step="0.1">
                <button onclick="classifyLithology()">Classify Lithology</button>
                <div class="result-box" id="classify-result">
                    <div class="label">Prediction</div>
                    <div class="value" id="pred-lithology">-</div>
                    <div class="prob-bar-container" id="prob-bars"></div>
                </div>
            </div>

            <div class="card">
                <h2>Porosity Estimation</h2>
                <label for="p_gr">Gamma Ray (API)</label>
                <input type="number" id="p_gr" value="40" step="1">
                <label for="p_res">Resistivity (ohm.m)</label>
                <input type="number" id="p_res" value="50" step="1">
                <label for="p_np">Neutron Porosity (%)</label>
                <input type="number" id="p_np" value="25" step="0.1">
                <label for="p_dp">Density Porosity (%)</label>
                <input type="number" id="p_dp" value="22" step="0.1">
                <label for="p_sonic">Sonic (us/ft)</label>
                <input type="number" id="p_sonic" value="75" step="1">
                <label for="p_cal">Caliper (in)</label>
                <input type="number" id="p_cal" value="8.5" step="0.1">
                <button onclick="estimatePorosity()">Estimate Porosity</button>
                <div class="result-box" id="porosity-result">
                    <div class="label">Estimated Porosity</div>
                    <div class="value" id="pred-porosity">-</div>
                </div>
            </div>

            <div class="card full-width">
                <h2>Probability Distribution</h2>
                <canvas id="probChart" height="80"></canvas>
            </div>
        </div>

        <footer>Elaborado por Ing. Kelvin Cabrera</footer>
    </div>

    <script>
        let probChart = null;

        function getFeatures(grId, resId, npId, dpId, sonicId, calId) {
            return [
                parseFloat(document.getElementById(grId).value),
                parseFloat(document.getElementById(resId).value),
                parseFloat(document.getElementById(npId).value),
                parseFloat(document.getElementById(dpId).value),
                parseFloat(document.getElementById(sonicId).value),
                parseFloat(document.getElementById(calId).value)
            ];
        }

        async function classifyLithology() {
            const features = getFeatures("gr", "res", "np", "dp", "sonic", "cal");
            try {
                const resp = await fetch("/api/classify", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ features })
                });
                const data = await resp.json();
                if (data.error) { alert(data.error); return; }
                document.getElementById("pred-lithology").textContent = data.prediction;
                renderProbBars(data.probabilities);
                renderProbChart(data.probabilities);
            } catch (e) { alert("Error: " + e.message); }
        }

        async function estimatePorosity() {
            const features = getFeatures("p_gr", "p_res", "p_np", "p_dp", "p_sonic", "p_cal");
            try {
                const resp = await fetch("/api/porosity", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ features })
                });
                const data = await resp.json();
                if (data.error) { alert(data.error); return; }
                document.getElementById("pred-porosity").textContent = data.porosity.toFixed(2) + " %";
            } catch (e) { alert("Error: " + e.message); }
        }

        function renderProbBars(probs) {
            const container = document.getElementById("prob-bars");
            container.innerHTML = "";
            for (const [cls, prob] of Object.entries(probs)) {
                const pct = (prob * 100).toFixed(1);
                container.innerHTML += `
                    <div class="prob-row">
                        <span class="name">${cls}</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
                        <span class="pct">${pct}%</span>
                    </div>`;
            }
        }

        function renderProbChart(probs) {
            const labels = Object.keys(probs);
            const values = Object.values(probs).map(v => v * 100);
            const ctx = document.getElementById("probChart").getContext("2d");
            if (probChart) probChart.destroy();
            probChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels,
                    datasets: [{
                        label: "Probability (%)",
                        data: values,
                        backgroundColor: "#06b6d4",
                        borderColor: "#22d3ee",
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: "#94a3b8" },
                            grid: { color: "#1e293b" }
                        },
                        x: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        async function checkHealth() {
            try {
                const resp = await fetch("/api/health");
                const data = await resp.json();
                const badge = document.getElementById("health-badge");
                if (data.models_loaded) {
                    badge.textContent = "Healthy";
                    badge.className = "health-badge health-ok";
                } else {
                    badge.textContent = "Models Not Loaded";
                    badge.className = "health-badge health-err";
                }
            } catch (e) {
                document.getElementById("health-badge").textContent = "Unreachable";
            }
        }

        checkHealth();
    </script>
</body>
</html>
